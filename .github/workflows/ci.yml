name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2
    - name: Install dependencies
      run: |
        gem install telegram-bot-ruby
        gem install dotenv
        gem install minitest
    - name: Run tests
      run: |
        ruby test1.rb
        ruby test2.rb
        ruby test3.rb
